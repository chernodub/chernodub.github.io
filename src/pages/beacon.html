<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="script-src 'unsafe-inline' 'self'; default-src 'self'; connect-src 'self'; child-src 'none';"
    />
    <title>Document</title>
  </head>
  <body>
    <button id="beacon-button">Schedule beacon</button>

    <script>
      document.querySelector('#beacon-button').addEventListener('click', () => {
          const result = navigator.sendBeacon('https://dummy.chernodub.dev/beacon', {data: 'some-data'});
          alert(`sendBeacon returned ${result}`)
      })
    </script>
  </body>
</html>
